<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>生成图标</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      padding: 20px;
      background: #f5f5f5;
    }
    .icon-container {
      display: flex;
      gap: 20px;
      margin-bottom: 20px;
    }
    .icon-box {
      text-align: center;
    }
    canvas {
      border: 1px solid #ddd;
      background: white;
    }
    button {
      padding: 10px 20px;
      background: #1a73e8;
      color: white;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      margin: 5px;
    }
    button:hover {
      background: #1557b0;
    }
    .instructions {
      background: white;
      padding: 20px;
      border-radius: 8px;
      margin-top: 20px;
    }
  </style>
</head>
<body>
  <h1>Gemini Chat Navigator 图标生成器</h1>

  <div class="icon-container">
    <div class="icon-box">
      <p>16x16</p>
      <canvas id="icon16" width="16" height="16"></canvas>
      <br><button onclick="download('icon16', 16)">下载</button>
    </div>
    <div class="icon-box">
      <p>48x48</p>
      <canvas id="icon48" width="48" height="48"></canvas>
      <br><button onclick="download('icon48', 48)">下载</button>
    </div>
    <div class="icon-box">
      <p>128x128</p>
      <canvas id="icon128" width="128" height="128"></canvas>
      <br><button onclick="download('icon128', 128)">下载</button>
    </div>
  </div>

  <button onclick="downloadAll()">下载全部图标</button>

  <div class="instructions">
    <h3>使用说明</h3>
    <ol>
      <li>点击"下载全部图标"按钮</li>
      <li>将下载的图标文件移动到 <code>icons/</code> 目录</li>
      <li>重新加载 Chrome 扩展</li>
    </ol>
  </div>

  <script>
    function drawIcon(canvas, size) {
      const ctx = canvas.getContext('2d');
      const scale = size / 128;

      // 清空画布
      ctx.clearRect(0, 0, size, size);

      // 背景圆角矩形
      ctx.fillStyle = '#1a73e8';
      roundRect(ctx, 0, 0, size, size, size * 0.15);
      ctx.fill();

      // 绘制目录图标
      ctx.strokeStyle = 'white';
      ctx.lineWidth = Math.max(1, size * 0.06);
      ctx.lineCap = 'round';

      const padding = size * 0.22;
      const lineHeight = size * 0.08;
      const lineGap = size * 0.14;
      const startX = size * 0.28;
      const lineLength = size * 0.5;

      // 三条横线表示目录
      for (let i = 0; i < 3; i++) {
        const y = padding + i * (lineHeight + lineGap);
        ctx.beginPath();
        ctx.moveTo(startX, y);
        ctx.lineTo(startX + lineLength, y);
        ctx.stroke();
      }

      // 右侧小箭头
      ctx.beginPath();
      const arrowX = size * 0.72;
      const arrowY = size * 0.5;
      const arrowSize = size * 0.12;
      ctx.moveTo(arrowX - arrowSize * 0.5, arrowY - arrowSize);
      ctx.lineTo(arrowX + arrowSize * 0.5, arrowY);
      ctx.lineTo(arrowX - arrowSize * 0.5, arrowY + arrowSize);
      ctx.stroke();
    }

    function roundRect(ctx, x, y, width, height, radius) {
      ctx.beginPath();
      ctx.moveTo(x + radius, y);
      ctx.lineTo(x + width - radius, y);
      ctx.quadraticCurveTo(x + width, y, x + width, y + radius);
      ctx.lineTo(x + width, y + height - radius);
      ctx.quadraticCurveTo(x + width, y + height, x + width - radius, y + height);
      ctx.lineTo(x + radius, y + height);
      ctx.quadraticCurveTo(x, y + height, x, y + height - radius);
      ctx.lineTo(x, y + radius);
      ctx.quadraticCurveTo(x, y, x + radius, y);
      ctx.closePath();
    }

    function download(canvasId, size) {
      const canvas = document.getElementById(canvasId);
      const link = document.createElement('a');
      link.download = `icon${size}.png`;
      link.href = canvas.toDataURL('image/png');
      link.click();
    }

    function downloadAll() {
      download('icon16', 16);
      setTimeout(() => download('icon48', 48), 100);
      setTimeout(() => download('icon128', 128), 200);
    }

    // 初始化绘制
    window.onload = function() {
      drawIcon(document.getElementById('icon16'), 16);
      drawIcon(document.getElementById('icon48'), 48);
      drawIcon(document.getElementById('icon128'), 128);
    };
  </script>
</body>
</html>
