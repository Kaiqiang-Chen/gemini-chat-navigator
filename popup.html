<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      width: 280px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #fff;
      color: #202124;
    }

    .popup-container {
      padding: 16px;
    }

    .header {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 16px;
      padding-bottom: 12px;
      border-bottom: 1px solid #e0e0e0;
    }

    .header-icon {
      width: 32px;
      height: 32px;
      background: linear-gradient(135deg, #1a73e8, #4285f4);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-size: 16px;
    }

    .header-text h1 {
      font-size: 14px;
      font-weight: 600;
      color: #202124;
    }

    .header-text p {
      font-size: 11px;
      color: #5f6368;
      margin-top: 2px;
    }

    .stats {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-bottom: 16px;
    }

    .stat-item {
      background: #f8f9fa;
      padding: 12px;
      border-radius: 8px;
      text-align: center;
    }

    .stat-value {
      font-size: 20px;
      font-weight: 600;
      color: #1a73e8;
    }

    .stat-label {
      font-size: 11px;
      color: #5f6368;
      margin-top: 4px;
    }

    .info {
      background: #e8f0fe;
      border-radius: 8px;
      padding: 12px;
      margin-bottom: 16px;
    }

    .info p {
      font-size: 12px;
      color: #1967d2;
      line-height: 1.5;
    }

    .actions {
      display: flex;
      gap: 8px;
    }

    .btn {
      flex: 1;
      padding: 10px 16px;
      border: none;
      border-radius: 6px;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: background-color 0.2s;
    }

    .btn-primary {
      background: #1a73e8;
      color: white;
    }

    .btn-primary:hover {
      background: #1557b0;
    }

    .btn-secondary {
      background: #f1f3f4;
      color: #202124;
    }

    .btn-secondary:hover {
      background: #e8eaed;
    }

    .footer {
      margin-top: 16px;
      padding-top: 12px;
      border-top: 1px solid #e0e0e0;
      text-align: center;
    }

    .footer a {
      font-size: 11px;
      color: #5f6368;
      text-decoration: none;
    }

    .footer a:hover {
      color: #1a73e8;
    }
  </style>
</head>
<body>
  <div class="popup-container">
    <div class="header">
      <div class="header-icon">📋</div>
      <div class="header-text">
        <h1>Gemini Chat Navigator</h1>
        <p>对话目录导航工具</p>
      </div>
    </div>

    <div class="stats">
      <div class="stat-item">
        <div class="stat-value" id="question-count">0</div>
        <div class="stat-label">问题数量</div>
      </div>
      <div class="stat-item">
        <div class="stat-value" id="session-time">-</div>
        <div class="stat-label">会话时长</div>
      </div>
    </div>

    <div class="info">
      <p>打开 Gemini 对话页面，目录面板会自动显示在右侧。将鼠标悬停在面板上即可展开查看所有问题。</p>
    </div>

    <div class="actions">
      <button class="btn btn-primary" id="open-gemini">打开 Gemini</button>
      <button class="btn btn-secondary" id="clear-data">清除数据</button>
    </div>

    <div class="footer">
      <a href="https://github.com" target="_blank">查看帮助</a>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
